name: verify

on:
  push:
  pull_request:

# Least-privilege default token (supply-chain hardening). Jobs override only if they need more.
permissions:
  contents: read

jobs:
  verify:
    name: pnpm verify
    runs-on: ubuntu-latest
    steps:
      # Actions pinned to full commit SHAs (re-pin on bump; trailing comment = human-readable tag).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      # --ignore-scripts: no dependency needs an install lifecycle script (Playwright is installed
      # explicitly in the e2e job); this blocks malicious postinstall (Shai-Hulud-class) in CI.
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm agent:doctor
      - run: pnpm verify
      # Coverage with a non-regression floor (SPEC-28): thresholds in vitest.config.ts fail this step
      # if coverage drops below ~3pt under baseline. `pnpm verify` above remains the primary blocking gate.
      - run: pnpm test:coverage
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: coverage-report
          path: coverage/lcov.info
          if-no-files-found: warn

  e2e:
    name: browser smoke (non-blocking)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm exec playwright install --with-deps chromium
      - run: pnpm e2e

  audit:
    # Supply-chain regression gate (SPEC-113): enforce the security posture the repo maintained by hand.
    # Scoped to --prod (the SHIPPED dependency surface - small + stable); dev-tool advisories don't ship
    # and would flake a blocking gate, so they stay covered by the periodic manual full `pnpm audit`.
    name: prod dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile --ignore-scripts
      - run: pnpm audit --prod
