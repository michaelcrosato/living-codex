<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>The Living Codex — First Light</title>
    <style>
      body {
        margin: 0;
        background: #05070c;
        color: #cfe6f5;
        font-family: ui-monospace, monospace;
        display: flex;
        gap: 16px;
        padding: 16px;
        align-items: flex-start;
      }
      #hud {
        white-space: pre;
        font-size: 14px;
        line-height: 1.5;
        min-width: 260px;
      }
      #hud::before {
        content: "THE LIVING CODEX\AAshfall — First Light\A\AWASD move · E talk · F fight · 1/2 exits · K save · O load\A";
        color: #8a97a8; /* WCAG 2.2 AA: ~7:1 on #05070c (was #4a5a6a ~2.9:1, failed) — SPEC-84 */
      }
      canvas {
        border: 1px solid #1b2230;
        border-radius: 4px;
      }
      #stage {
        position: relative;
      }
      #cold-open {
        position: fixed;
        inset: 0;
        background: #05070c;
        color: #cfe6f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        text-align: center;
        font-size: 20px;
        letter-spacing: 0.04em;
        cursor: pointer;
      }
      #cold-open .prompt {
        margin-top: 24px;
        color: #8a97a8; /* WCAG 2.2 AA: ~7:1 on #05070c (was #4a5a6a ~2.9:1, failed) — SPEC-84 */
        font-size: 14px;
      }
      #dialogue {
        display: none;
        position: absolute;
        left: 16px;
        right: 16px;
        bottom: 16px;
        padding: 14px 16px;
        background: rgba(8, 11, 18, 0.92);
        border: 1px solid #2bd1ff;
        border-radius: 6px;
        font-size: 14px;
        line-height: 1.5;
        color: #e6f3ff;
      }
      #dialogue .speaker {
        margin: 0 0 8px;
        color: #2bd1ff;
        font-weight: bold;
      }
      #dialogue #dialogue-text {
        margin: 0 0 10px;
        white-space: pre-wrap;
      }
      #dialogue .hint {
        margin: 10px 0 0;
        color: #8a97a8; /* WCAG 2.2 AA: ~7:1 on #05070c (was #4a5a6a ~2.9:1, failed) — SPEC-84 */
        font-size: 12px;
      }
      #controls button,
      #dialogue button {
        font: inherit;
        color: #cfe6f5;
        background: #0b1018;
        border: 1px solid #2bd1ff;
        border-radius: 4px;
        padding: 6px 10px;
        cursor: pointer;
      }
      #dialogue button {
        display: block;
        width: 100%;
        text-align: left;
        margin: 4px 0;
      }
      #controls button[aria-pressed="true"] {
        background: #14323f;
      }
      /* A clearly visible keyboard focus indicator (WCAG 2.4.7). */
      :focus-visible {
        outline: 2px solid #2bd1ff;
        outline-offset: 2px;
      }
      /* Dyslexia-friendly mode: a more legible sans stack + looser spacing (user-toggled). */
      body.dyslexia {
        font-family: "Atkinson Hyperlegible", Verdana, Tahoma, sans-serif;
        letter-spacing: 0.02em;
      }
      body.dyslexia #hud,
      body.dyslexia #dialogue {
        line-height: 1.7;
      }
      /* Visually hidden but screen-reader announced (SPEC-81 location announcer). */
      .sr-only {
        position: absolute;
        width: 1px;
        height: 1px;
        margin: -1px;
        padding: 0;
        overflow: hidden;
        clip: rect(0 0 0 0);
        white-space: nowrap;
        border: 0;
      }
      /* Transient, screen-reader-announced status toast (e.g. a save failure). */
      .toast {
        position: fixed;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        background: #0b1018;
        color: #e6f3ff;
        border: 1px solid #2bd1ff;
        border-radius: 6px;
        padding: 10px 16px;
        font-size: 14px;
        z-index: 10;
      }
      @media (prefers-reduced-motion: reduce) {
        *,
        *::before,
        *::after {
          animation-duration: 0.001ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.001ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="stage">
      <canvas id="game" width="800" height="600"></canvas>
      <div
        id="dialogue"
        role="dialog"
        aria-modal="true"
        aria-labelledby="dialogue-speaker"
        aria-hidden="true"
      >
        <p id="dialogue-speaker" class="speaker"></p>
        <p id="dialogue-text" aria-live="polite"></p>
        <div id="dialogue-choices" role="group" aria-label="Dialogue choices"></div>
        <p class="hint">number keys or click a choice · Esc to leave</p>
      </div>
    </div>
    <div id="hud">Loading…</div>
    <div id="announcer" class="sr-only" role="status" aria-live="polite"></div>
    <div id="controls">
      <button id="font-toggle" type="button" aria-pressed="false">Aa Dyslexia-friendly font</button>
    </div>
    <div id="cold-open">
      <div class="line">It is raining, and it has always been raining.</div>
      <div class="line">You don't remember how you got here.</div>
      <div class="prompt">— press any key —</div>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
